<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rádio L20 — Offline</title>
  <meta name="theme-color" content="#0057D9" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #05070A;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.6;
    }
    .offline-icon svg { width: 100%; height: 100%; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p { color: #a0a0a0; line-height: 1.6; margin-bottom: 1.5rem; }
    .retry-btn {
      display: inline-block;
      background: #0057D9;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #0044b3; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0057D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão com a internet e tente novamente. Enquanto isso, a Rádio L20 está ao vivo no 87.9 FM!</p>
    <button class="retry-btn" onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
